<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPPO Lockscreen — Cricket Scorecard Journey</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  ::-webkit-scrollbar { display: none; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #08090d 0%, #12141c 50%, #08090d 100%);
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 20px 16px;
    font-family: system-ui, -apple-system, sans-serif;
    user-select: none; -webkit-user-select: none;
  }
  @keyframes live-pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.85); } }
  @keyframes fade-pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
  @keyframes swipe-arrow { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(6px); } }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pop-in { 0% { transform: scale(0.5); opacity: 0; } 50% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
  @keyframes scorecard-in { 0% { transform: translateY(-30px); opacity: 0; max-height: 0; } 100% { transform: translateY(0); opacity: 1; max-height: 200px; } }
  @keyframes slide-in-down { from { transform: translateY(-100%); opacity: 0.6; } to { transform: translateY(0); opacity: 1; } }
  @keyframes slide-out-down { from { transform: translateY(0); opacity: 1; } to { transform: translateY(100%); opacity: 0.6; } }
  @keyframes slide-in-up { from { transform: translateY(100%); opacity: 0.6; } to { transform: translateY(0); opacity: 1; } }
  @keyframes slide-out-up { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-100%); opacity: 0.6; } }
  @keyframes slide-in-left { from { transform: translateX(100%); opacity: 0.6; } to { transform: translateX(0); opacity: 1; } }
  @keyframes slide-out-left { from { transform: translateX(0); opacity: 1; } to { transform: translateX(-100%); opacity: 0.6; } }
  @keyframes slide-in-right { from { transform: translateX(-100%); opacity: 0.6; } to { transform: translateX(0); opacity: 1; } }
  @keyframes slide-out-right { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0.6; } }

  .header { text-align: center; margin-bottom: 14px; }
  .header h1 { font-size: 17px; font-weight: 700; color: #fff; margin: 0 0 4px; letter-spacing: -0.3px; }
  .header p { font-size: 11px; color: rgba(255,255,255,0.3); margin: 0; }
  .nav-bar { display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; justify-content: center; }
  .nav-btn {
    padding: 5px 11px; border-radius: 8px; font-size: 11px; font-weight: 600;
    border: none; cursor: pointer; transition: all 0.2s;
    background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.3);
    outline: 1px solid transparent;
  }
  .nav-btn.active {
    background: rgba(34,197,94,0.2); color: #22c55e;
    outline: 1px solid rgba(34,197,94,0.3);
  }
  .phone-frame {
    width: 340px; max-width: calc(100vw - 32px);
    border-radius: 12px;
    box-shadow: 0 0 0 2px #222, 0 0 0 2.5px rgba(255,255,255,0.1), 0 20px 60px rgba(0,0,0,0.6);
    background: #000; position: relative; overflow: visible;
  }
  .power-btn {
    position: absolute; right: -3px; top: 160px; width: 3px; height: 45px;
    background: linear-gradient(90deg, #333, #444, #333); border-radius: 0 2px 2px 0;
  }
  .vol-btn-1 {
    position: absolute; left: -3px; top: 140px; width: 3px; height: 35px;
    background: linear-gradient(90deg, #333, #444, #333); border-radius: 2px 0 0 2px;
  }
  .vol-btn-2 {
    position: absolute; left: -3px; top: 185px; width: 3px; height: 35px;
    background: linear-gradient(90deg, #333, #444, #333); border-radius: 2px 0 0 2px;
  }
  .screen-area {
    border-radius: 12px; overflow: hidden; height: 756px;
    position: relative; background: #0d0d0f;
  }
  .camera-hole {
    position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    width: 10px; height: 10px; border-radius: 50%;
    background: #0a0a0a; border: 1px solid rgba(255,255,255,0.08);
    z-index: 100; box-shadow: 0 0 3px rgba(0,0,0,0.5);
  }
  .screen-content { height: 100%; }
  .footer { margin-top: 12px; color: rgba(255,255,255,0.2); font-size: 11px; }

  /* Tap zones */
  .tap-left { position: absolute; top: 0; left: 0; bottom: 0; width: 12%; cursor: pointer; z-index: 12; }
  .tap-right { position: absolute; top: 0; right: 0; bottom: 0; width: 12%; cursor: pointer; z-index: 12; }

  /* Scorecard */
  .scorecard-widget {
    position: absolute; z-index: 40; cursor: grab; touch-action: none; user-select: none;
    transform-origin: top left;
  }
  .scorecard-widget.dragging { cursor: grabbing; }
  .scorecard-inner {
    position: relative;
    background: rgba(22, 28, 45, 0.92);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-radius: 14px; padding: 10px 14px 12px;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    min-width: 165px;
  }
  .scorecard-widget.dragging .scorecard-inner {
    box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.08);
  }

  /* Sub-page dots */
  .sub-dots {
    position: absolute; bottom: 38px; left: 0; right: 0;
    display: flex; justify-content: center; gap: 6px; z-index: 10;
  }
  .sub-dot {
    width: 6px; height: 6px; border-radius: 50%; cursor: pointer;
  }
</style>
</head>
<body>

<div class="header">
  <h1>🏏 OPPO Lockscreen — Cricket Scorecard Journey</h1>
  <p>Swipe or tap edges to navigate • Interactive prototype</p>
</div>

<div class="nav-bar" id="navBar"></div>

<div class="phone-frame" id="phoneFrame">
  <div class="power-btn"></div>
  <div class="vol-btn-1"></div>
  <div class="vol-btn-2"></div>
  <div class="screen-area">
    <div class="camera-hole"></div>
    <div class="screen-content" id="screenContent"></div>
  </div>
</div>

<div class="footer">← Swipe or tap edges to navigate →</div>

// ========== RENDER HELPERS ==========
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'style' && typeof v === 'object') {
        Object.assign(e.style, v);
      } else if (k.startsWith('on')) {
        e.addEventListener(k.slice(2).toLowerCase(), v);
      } else if (k === 'className') {
        e.className = v;
      } else if (k === 'draggable') {
        e.draggable = v;
      } else {
        e.setAttribute(k, v);
      }
    }
  }
  for (const c of children) {
    if (c == null) continue;
    if (typeof c === 'string' || typeof c === 'number') {
      e.appendChild(document.createTextNode(c));
    } else if (c instanceof Node) {
      e.appendChild(c);
    }
  }
  return e;
}

function img(src, alt, style) {

}

function scorecardDragStart(id, cx, cy) {
  const sc = getScorecardState(id);
  if (sc.isResizing) return;
  const widgetEl = document.querySelector('[data-scorecard="' + id + '"]') ||
    document.querySelectorAll('.scorecard-widget')[id === 'slot1sub1' ? 1 : 0];

  const rect = widgetEl.getBoundingClientRect();
  sc.dragOffsetX = cx - rect.left; sc.dragOffsetY = cy - rect.top;
  sc.isDragging = true;
  sc._id = id;
  activeScorecard = sc;
}

function scorecardResizeStart(id, cx, cy) {
  const sc = getScorecardState(id);
  sc.resizeStartX = cx; sc.resizeStartY = cy; sc.resizeStartScale = sc.scale;
  sc.isResizing = true; sc.isDragging = true;
  sc._id = id;
  activeScorecard = sc;
}

let activeScorecard = null;

window.addEventListener('mousemove', (e) => {
  if (!activeScorecard) return;
  if (activeScorecard.isResizing) {
    const dx = e.clientX - activeScorecard.resizeStartX;
    const dy = e.clientY - activeScorecard.resizeStartY;
    activeScorecard.scale = Math.max(0.45, Math.min(1.3, activeScorecard.resizeStartScale + (dx + dy) / 150));
  } else if (activeScorecard.isDragging) {
    const parent = document.querySelector('.screen-area');
    if (!parent) return;
    const pr = parent.getBoundingClientRect();
    const newX = e.clientX - pr.left - activeScorecard.dragOffsetX;
    const newY = e.clientY - pr.top - activeScorecard.dragOffsetY;
    const cardW = 165 * activeScorecard.scale, cardH = 85 * activeScorecard.scale;
    activeScorecard.x = Math.max(0, Math.min(pr.width - cardW, newX));
    activeScorecard.y = Math.max(0, Math.min(pr.height - cardH, newY));
  }
  render();
});

// ========== PULL ANIMATION ==========
function runPullAnimation() {
  state.pullProgress = 0;
  pullStartTime = Date.now();
  function animate() {
    const elapsed = Date.now() - pullStartTime;
    const delay = 500, duration = 1200;
    if (elapsed < delay) {
      state.pullProgress = 0;
    } else if (elapsed < delay + duration) {
      const t = (elapsed - delay) / duration;
      const c1 = 1.70158, c3 = c1 + 1;
      state.pullProgress = Math.min(1, Math.max(0, 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2)));
    } else {
      state.pullProgress = 1;
      render();
      return;
    }
    render();
    animFrameId = requestAnimationFrame(animate);
  }
  animFrameId = requestAnimationFrame(animate);
}

// ========== NAVIGATION ==========
function navigateSubPage(nextSub, direction) {
  if (state.slot1SubTransitioning) return;
  state.slot1SubDir = direction;
  state.slot1SubTransitioning = true;
  render();
  setTimeout(() => {
    state.slot1SubIndex = nextSub;
    setTimeout(() => { state.slot1SubTransitioning = false; render(); }, 50);
    render();
  }, 280);
}

function navigateTo(next, direction, type) {
  direction = direction || 'left';
  type = type || 'horizontal';
  if (state.transitioning || next === state.currentScreen || next < 0 || next > 5) return;
  state.transDir = direction;
  state.transType = type;
  state.transitioning = true;
  if (state.currentScreen === 1 && next !== 1) state.slot1SubIndex = 0;
  render();
  const delay = type === 'vertical' ? 30 : 280;
  setTimeout(() => {
    state.currentScreen = next;
    if (next === 1 && !state.isFollowed) {
      if (animFrameId) cancelAnimationFrame(animFrameId);
      runPullAnimation();
    } else {
      state.pullProgress = 0;
      if (animFrameId) cancelAnimationFrame(animFrameId);
    }
    if (next === 2) state.slot2ScrollY = 0;
    setTimeout(() => { state.transitioning = false; render(); }, 50);
    render();
  }, delay);
}

function handleSwipe(dx, dy) {
  if (state.currentScreen === 1 && !state.isFollowed && dy > 60 && Math.abs(dy) > Math.abs(dx) && state.pullProgress >= 1) {
    navigateTo(2, 'down', 'vertical'); return;
  }
  if (state.currentScreen === 2 && Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 30) {
    scrollSlot2(dy < 0 ? 150 : -150); return;
  }
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    if (state.currentScreen === 1 && state.isFollowed) {
      if (dx < 0) {
        if (state.slot1SubIndex < 1) navigateSubPage(state.slot1SubIndex + 1, 'left');
        else if (state.currentScreen < 5) navigateTo(state.currentScreen + 1, 'left');
      }
      if (dx > 0) {
        if (state.slot1SubIndex > 0) navigateSubPage(state.slot1SubIndex - 1, 'right');
        else if (state.currentScreen > 0) navigateTo(state.currentScreen - 1, 'right');
      }
      return;
    }
    if (dx < 0 && state.currentScreen < 5) navigateTo(state.currentScreen + 1, 'left');
    if (dx > 0 && state.currentScreen > 0) navigateTo(state.currentScreen - 1, 'right');
  }
}

function handleFollowToggle() {
  if (!state.isFollowed) {
    state.isFollowed = true;
    state.followAnimPhase = 3;
    state.slot2ScrollY = 0;
  } else {
    state.followAnimPhase = 0;
    state.isFollowed = false;
    state.slot2ScrollY = 0;
  }
  render();
}

function scrollSlot2(delta) {
  const activeHeight = state.isFollowed && state.followAnimPhase >= 3 ? state.slot2ImgAfterHeight : state.slot2ImgBeforeHeight;
  const maxScroll = Math.max(0, activeHeight - state.slot2ContainerHeight);
  state.slot2ScrollY = Math.max(0, Math.min(maxScroll, state.slot2ScrollY + delta));
  render();
}

  container.appendChild(el('div', { style: { position: 'absolute', top: '12%', left: '20px', zIndex: '5' }},
    el('div', { style: { fontSize: '28px', fontWeight: '900', color: '#fff', letterSpacing: '4px',
      textTransform: 'uppercase', lineHeight: '1', textShadow: '0 2px 12px rgba(0,0,0,0.8)' }}, 'RESURGENCE')
  ));
  // #Jatin Sapru tag
  container.appendChild(el('div', { style: { position: 'absolute', top: '18%', left: '20px', zIndex: '5' }},
    el('span', { style: { fontSize: '11px', fontWeight: '600', color: 'rgba(255,255,255,0.7)',
      background: 'rgba(255,255,255,0.12)', borderRadius: '12px', padding: '3px 10px' }}, '#Jatin Sapru')
  ));
  // Main headline
  container.appendChild(el('div', { style: { position: 'absolute', top: '54%', left: '16px', right: '16px', zIndex: '5' }},
    el('div', { style: { fontSize: '17px', fontWeight: '800', color: '#fff', lineHeight: '1.3',
      textShadow: '0 1px 8px rgba(0,0,0,0.6)' }}, 'Surya And Ishan Score Fifties To Level The Series')
  ));
  // Bottom card
  const bottomCard = el('div', { style: { position: 'absolute', bottom: '60px', left: '12px', right: '12px', zIndex: '5',
    background: 'rgba(30,30,35,0.9)', backdropFilter: 'blur(12px)', borderRadius: '14px', padding: '14px 14px 12px', overflow: 'hidden' }},
    el('div', { style: { fontSize: '14px', fontWeight: '700', color: '#fff', marginBottom: '5px' }}, "Cricket's Smartest Captains"),
    el('div', { style: { fontSize: '11px', color: 'rgba(255,255,255,0.5)', lineHeight: '1.4', marginBottom: '10px' }},
      'A look at the tactical masterminds who have shaped the game with their strategic brilliance on the field.'),
    el('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between' }},
      el('div', { style: { display: 'flex', alignItems: 'center', gap: '6px' }},
        el('span', { style: { fontSize: '16px', color: '#ef4444' }}, '\u2665'),
        el('span', { style: { fontSize: '12px', color: 'rgba(255,255,255,0.6)', fontWeight: '600' }}, '10k')
      ),
      el('div', { style: { fontSize: '11px', fontWeight: '700', color: '#fff',
        background: 'rgba(255,255,255,0.12)', borderRadius: '16px', padding: '6px 16px', cursor: 'pointer' }}, 'Read More')
    )
  );
  container.appendChild(bottomCard);
  // Sub-page dots
  const dots = el('div', { className: 'sub-dots' },
    el('div', { className: 'sub-dot', style: { background: 'rgba(255,255,255,0.3)' }, onClick: () => navigateSubPage(0, 'right') }),
    el('div', { className: 'sub-dot', style: { background: '#fff' } })
  );
  container.appendChild(dots);
  // Scorecard
  container.appendChild(createScorecard('slot1sub1'));
  // Side nav
  container.appendChild(el('div', { className: 'tap-left',
    onClick: () => { if (state.slot1SubIndex > 0) navigateSubPage(0, 'right'); else navigateTo(0, 'right'); }}));
  container.appendChild(el('div', { className: 'tap-right', onClick: () => navigateTo(2, 'left') }));
  return container;
}

function renderSlot1() {
  if (state.isFollowed) {
    const subContent = state.slot1SubIndex === 1 ? renderSlot1Sub1() : renderSlot1Sub0();
    const wrapper = el('div', { style: { height: '100%', position: 'relative', overflow: 'hidden' }});
    const animDiv = el('div', { style: {
      height: '100%',
      animation: state.slot1SubTransitioning
        ? (state.slot1SubDir === 'left' ? 'slide-out-left 0.28s ease-in forwards' : 'slide-out-right 0.28s ease-in forwards')
        : (state.slot1SubDir === 'left' ? 'slide-in-left 0.28s ease-out' : 'slide-in-right 0.28s ease-out'),
    }});
    animDiv.appendChild(subContent);
    wrapper.appendChild(animDiv);
    return wrapper;
  }
  return renderSlot1Unsubscribed();
}

function renderSlot1Sub0() {
  const container = el('div', { style: { height: '100%', position: 'relative', overflow: 'hidden' }},
    img(IMG_SLOT1_FOLLOWED, 'Slot 1 Cricket')
  );
  container.appendChild(createScorecard('slot1sub0'));
  // Dots
  container.appendChild(el('div', { className: 'sub-dots' },
    el('div', { className: 'sub-dot', style: { background: '#fff' } }),
    el('div', { className: 'sub-dot', style: { background: 'rgba(255,255,255,0.3)' }, onClick: () => navigateSubPage(1, 'left') })
  ));
  container.appendChild(el('div', { className: 'tap-left', onClick: () => navigateTo(0, 'right') }));
  container.appendChild(el('div', { className: 'tap-right', onClick: () => navigateSubPage(1, 'left') }));
  return container;
}

function renderSlot1Unsubscribed() {
  const maxHeight = 18;
  const overlayHeight = state.pullProgress * maxHeight;
  const contentOpacity = Math.max(0, (state.pullProgress - 0.2) / 0.8);
  const imgShift = state.pullProgress * 6;

  const container = el('div', { style: { height: '100%', position: 'relative', overflow: 'hidden' }},
    img(IMG_MAGAZINE, 'Magazine', { transform: 'translateY(' + imgShift + 'px)' })
  );

  // Pulldown overlay
  const overlay = el('div', { style: { position: 'absolute', top: '0', left: '0', right: '0',
    height: overlayHeight + '%', background: '#000', zIndex: '10', overflow: 'hidden' }});
  overlay.appendChild(el('div', { style: { position: 'absolute', bottom: '-15px', left: '0', right: '0', height: '15px',
    background: 'linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%)' }}));
  const pullContent = el('div', { style: { width: '100%', height: '100%', display: 'flex',
    alignItems: 'center', justifyContent: 'center', opacity: String(contentOpacity) }});
  const pullImg = document.createElement('img');
  pullImg.src = IMG_PULLDOWN; pullImg.draggable = false;
  Object.assign(pullImg.style, { maxWidth: '70%', maxHeight: '90%', objectFit: 'fill', userSelect: 'none', pointerEvents: 'none' });
  pullContent.appendChild(pullImg);
  overlay.appendChild(pullContent);
  container.appendChild(overlay);

  // Tap to pull down
  if (state.pullProgress >= 1) {
    const tapZone = el('div', { onClick: () => navigateTo(2, 'down', 'vertical'),
      style: { position: 'absolute', top: '0', left: '15%', right: '15%', height: overlayHeight + '%',
        cursor: 'pointer', zIndex: '15' }});
    tapZone.appendChild(el('div', { style: { position: 'absolute', bottom: '8px', left: '0', right: '0', textAlign: 'center',
      animation: 'fade-pulse 1.5s ease-in-out infinite' }},
      el('span', { style: { fontSize: '10px', color: 'rgba(255,255,255,0.5)',
        background: 'rgba(0,0,0,0.4)', borderRadius: '6px', padding: '3px 10px' }}, 'Tap to pull down')
    ));
    container.appendChild(tapZone);
  }
  if (state.pullProgress < 1) {
    container.appendChild(el('div', { onClick: () => runPullAnimation(),
      style: { position: 'absolute', top: '0', left: '25%', right: '25%', height: '40%',
        cursor: 'pointer', zIndex: '15' }}));
  }
  if (state.pullProgress >= 1) {
    container.appendChild(el('div', { style: { position: 'absolute', bottom: '50px', left: '0', right: '0',
      display: 'flex', justifyContent: 'center', zIndex: '22', animation: 'fade-in 0.5s ease-out 0.3s both' }},
      el('div', { style: { background: 'rgba(0,0,0,0.55)', backdropFilter: 'blur(10px)',
        borderRadius: '10px', padding: '7px 16px', fontSize: '11px', color: 'rgba(255,255,255,0.6)' }},
        'Tap pull-down to open \u2022 Swipe left/right to navigate')
    ));
  }
  container.appendChild(el('div', { className: 'tap-left', onClick: () => navigateTo(0, 'right') }));
  container.appendChild(el('div', { className: 'tap-right', onClick: () => navigateTo(2, 'left') }));
  return container;
}

function renderSlot2() {
  const showAfter = state.followAnimPhase >= 2;
  const afterReady = state.followAnimPhase >= 3;
  const activeImgHeight = afterReady ? state.slot2ImgAfterHeight : state.slot2ImgBeforeHeight;
  const followBtnY = (state.isFollowed && state.followAnimPhase >= 3) ? 525 : 398;

  const container = el('div', { style: { height: '100%', position: 'relative', overflow: 'hidden', background: '#0d0d0f' }});
  const imgContainer = el('div', { style: { position: 'absolute', top: '0', left: '0', right: '0', bottom: '0', overflow: 'hidden' }});

  // Before image
  const beforeImg = document.createElement('img');
  beforeImg.src = IMG_FRESH_BEFORE; beforeImg.draggable = false;
  Object.assign(beforeImg.style, { position: 'absolute', top: '0', left: '0', width: '100%', height: 'auto',
    userSelect: 'none', pointerEvents: 'none',
    transform: 'translateY(-' + state.slot2ScrollY + 'px)',
    transition: 'transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94)',
    opacity: showAfter ? '0' : '1', zIndex: showAfter ? '1' : '2' });
  beforeImg.onload = function() {
    const scale = 340 / this.naturalWidth;
    state.slot2ImgBeforeHeight = this.naturalHeight * scale;
  };
  imgContainer.appendChild(beforeImg);

  // After image
  const afterImg = document.createElement('img');
  afterImg.src = IMG_FRESH_AFTER; afterImg.draggable = false;
  Object.assign(afterImg.style, { position: 'absolute', top: '0', left: '0', width: '100%', height: 'auto',
    userSelect: 'none', pointerEvents: 'none',
    transform: 'translateY(-' + state.slot2ScrollY + 'px)',
    transition: showAfter
      ? 'opacity 0.6s ease-out, transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94)'
      : 'transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94)',
    opacity: showAfter ? '1' : '0', zIndex: showAfter ? '2' : '1' });
  afterImg.onload = function() {
    const scale = 340 / this.naturalWidth;
    state.slot2ImgAfterHeight = this.naturalHeight * scale;
  };
  imgContainer.appendChild(afterImg);
  container.appendChild(imgContainer);

  // Follow button tap zone
  container.appendChild(el('div', { onClick: (e) => { e.stopPropagation(); handleFollowToggle(); },
    style: { position: 'absolute', top: (followBtnY - state.slot2ScrollY - 22) + 'px', right: '4%',
      width: '110px', height: '48px', cursor: 'pointer', zIndex: '30', borderRadius: '24px' }}));

  // Scroll zones
  container.appendChild(el('div', { onClick: () => scrollSlot2(-200),
    style: { position: 'absolute', top: '0', left: '15%', right: '15%', height: '20%', cursor: 'pointer', zIndex: '8' }}));
  container.appendChild(el('div', { onClick: () => scrollSlot2(200),
    style: { position: 'absolute', bottom: '0', left: '15%', right: '15%', height: '20%', cursor: 'pointer', zIndex: '8' }}));

  // Scrollbar
  const scrollTrack = el('div', { style: { position: 'absolute', right: '3px', top: '40px', bottom: '40px',
    width: '2.5px', borderRadius: '2px', background: 'rgba(255,255,255,0.08)', zIndex: '15' }});
  const scrollThumbH = Math.max(15, (state.slot2ContainerHeight / Math.max(1, activeImgHeight)) * 100);
  const scrollThumbY = (state.slot2ScrollY / Math.max(1, activeImgHeight - state.slot2ContainerHeight)) * (100 - scrollThumbH);
  scrollTrack.appendChild(el('div', { style: { width: '100%', borderRadius: '2px', background: 'rgba(255,255,255,0.3)',
    height: scrollThumbH + '%', transform: 'translateY(' + scrollThumbY + '%)', transition: 'transform 0.3s ease' }}));
  container.appendChild(scrollTrack);

  // X close button
  container.appendChild(el('div', { onClick: (e) => { e.stopPropagation(); navigateTo(1, 'up', 'vertical'); },
    style: { position: 'absolute', top: '3.5%', left: '2%', width: '52px', height: '52px',
      cursor: 'pointer', zIndex: '50', borderRadius: '50%' }}));

  // Side nav
  container.appendChild(el('div', { className: 'tap-left', style: { zIndex: '10' }, onClick: () => navigateTo(1, 'right') }));
  container.appendChild(el('div', { className: 'tap-right', style: { zIndex: '10' }, onClick: () => navigateTo(3, 'left') }));

  // Hints
  if (!state.isFollowed) {
    container.appendChild(el('div', { style: { position: 'absolute', bottom: '30px', left: '0', right: '0',
      display: 'flex', justifyContent: 'center', zIndex: '20', animation: 'fade-pulse 2s ease-in-out infinite', pointerEvents: 'none' }},
      el('div', { style: { background: 'rgba(0,0,0,0.6)', backdropFilter: 'blur(10px)',
        borderRadius: '10px', padding: '7px 16px', fontSize: '11px', color: 'rgba(255,255,255,0.5)' }},
        'Tap "Follow +" on the IPL2026 card')
    ));
  }
  if (state.isFollowed && state.followAnimPhase >= 3) {
    container.appendChild(el('div', { style: { position: 'absolute', bottom: '30px', left: '0', right: '0',
      display: 'flex', justifyContent: 'center', zIndex: '20', animation: 'fade-in 0.5s ease-out 0.5s both', pointerEvents: 'none' }},
      el('div', { style: { background: 'rgba(0,0,0,0.6)', backdropFilter: 'blur(10px)',
        borderRadius: '10px', padding: '7px 16px', fontSize: '11px', color: 'rgba(255,255,255,0.5)' }},
        'Tap "Following" to unsubscribe & remove scorecard')
    ));
  }
  return container;
}

function renderPlaceholder(slotNum) {
  const container = el('div', { style: { height: '100%', display: 'flex', flexDirection: 'column', alignItems: 'center',
    justifyContent: 'center', background: 'linear-gradient(180deg, #0d1117 0%, #161b22 50%, #0d1117 100%)', position: 'relative' }},
    el('div', { style: { width: '70px', height: '70px', borderRadius: '20px',
      background: 'rgba(255,255,255,0.05)', border: '2px dashed rgba(255,255,255,0.15)',
      display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '28px', marginBottom: '16px' }}, '\uD83D\uDCF7'),
    el('div', { style: { fontSize: '18px', fontWeight: '700', color: 'rgba(255,255,255,0.6)', marginBottom: '6px' }}, 'Slot ' + slotNum),
    el('div', { style: { fontSize: '13px', color: 'rgba(255,255,255,0.25)', padding: '0 40px', textAlign: 'center' }}, 'Awaiting image upload')
  );
  const navBtns = el('div', { style: { position: 'absolute', bottom: '80px', left: '0', right: '0',
    display: 'flex', justifyContent: 'center', gap: '30px' }});
  const btnStyle = { width: '44px', height: '44px', borderRadius: '50%', border: '1px solid rgba(255,255,255,0.15)',
    background: 'rgba(255,255,255,0.06)', color: 'rgba(255,255,255,0.6)', fontSize: '18px', cursor: 'pointer',
    display: 'flex', alignItems: 'center', justifyContent: 'center' };
  navBtns.appendChild(el('button', { onClick: (e) => { e.stopPropagation(); navigateTo(state.currentScreen - 1, 'right'); }, style: btnStyle }, '\u2190'));
  if (slotNum < 5) {
    navBtns.appendChild(el('button', { onClick: (e) => { e.stopPropagation(); navigateTo(state.currentScreen + 1, 'left'); }, style: btnStyle }, '\u2192'));
  }
  container.appendChild(navBtns);
  return container;
}

const screenRenderers = [
  renderHome,
  renderSlot1,
  renderSlot2,
  () => renderPlaceholder(3),
  () => renderPlaceholder(4),
  () => renderPlaceholder(5),
];

// ========== MAIN RENDER ==========
function render() {
  // Nav bar
  const navBar = document.getElementById('navBar');
  navBar.innerHTML = '';
  SCREEN_LABELS.forEach((label, i) => {
    const btn = el('button', {
      className: 'nav-btn' + (state.currentScreen === i ? ' active' : ''),
      onClick: () => navigateTo(i, i > state.currentScreen ? 'left' : 'right')
    }, label);
    navBar.appendChild(btn);
  });

  // Screen content
  const contentEl = document.getElementById('screenContent');
  // Determine animation
  let anim;
  if (state.transitioning) {
    if (state.transType === 'vertical') anim = 'none';
    else anim = state.transDir === 'left' ? 'slide-out-left 0.28s ease-in forwards' : 'slide-out-right 0.28s ease-in forwards';
  } else {
    if (state.transType === 'vertical') {
      anim = state.transDir === 'down' ? 'slide-in-down 0.4s cubic-bezier(0.22, 1, 0.36, 1)' : 'slide-in-up 0.4s cubic-bezier(0.22, 1, 0.36, 1)';
    } else {
      anim = state.transDir === 'left' ? 'slide-in-left 0.28s ease-out' : 'slide-in-right 0.28s ease-out';
    }
  }
  contentEl.innerHTML = '';
  contentEl.style.animation = anim;
  contentEl.style.height = '100%';
  contentEl.appendChild(screenRenderers[state.currentScreen]());
}

// ========== INPUT HANDLERS ==========
const phoneFrame = document.getElementById('phoneFrame');
phoneFrame.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
phoneFrame.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  handleSwipe(dx, dy);
});
phoneFrame.addEventListener('mousedown', (e) => {
  mouseStartX = e.clientX; mouseStartY = e.clientY; mouseDragging = true;
});
phoneFrame.addEventListener('mouseup', (e) => {
  if (!mouseDragging) return;
  mouseDragging = false;
  const dx = e.clientX - mouseStartX;
  const dy = e.clientY - mouseStartY;
  handleSwipe(dx, dy);
});

// ========== INIT ==========
render();
// Start pull animation for slot 1 on first visit
setTimeout(() => { state.showHint = false; render(); }, 4000);
</script>
